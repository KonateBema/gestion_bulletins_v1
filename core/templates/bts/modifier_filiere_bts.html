{% extends 'base.html' %}

{% block content %}

<div class="container mt-4">

    <div class="card">

        <div class="card-header">
            Modifier une Filière BTS
        </div>

        <div class="card-body">

            <form method="post">
                {% csrf_token %}

                <div class="mb-3">

                    <label class="form-label">
                        Nom de la filière
                    </label>

                    <input
                        type="text"
                        name="nom"
                        value="{{ filiere.nom }}"
                        class="form-control"
                        required>

                </div>

                <button class="btn btn-primary">
                    Mettre à jour
                </button>

                <a href="{% url 'liste_filieres_bts' %}"
                   class="btn btn-secondary">
                    Retour
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
