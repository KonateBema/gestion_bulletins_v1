<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}École Pro{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #1e293b;
            color: white;
            overflow-y: auto;
        }

        .sidebar .brand {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #334155;
            padding-left: 25px;
        }

        .section-title {
            padding: 15px 20px 5px;
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* CONTENT */
        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
            }
        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->
    {% include "sidebar.html" %}

    <!-- CONTENU PRINCIPAL -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>

</body>

</html>
