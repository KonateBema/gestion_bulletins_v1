<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <title>{% block title %}École Pro{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
        }

        /* SIDEBAR */
        .sidebar {
            width: 260px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: #1e293b;
            color: white;
            overflow-y: auto;
        }

        .sidebar .brand {
            font-size: 22px;
            font-weight: bold;
            text-align: center;
            padding: 20px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .sidebar a {
            display: block;
            padding: 12px 20px;
            color: white;
            text-decoration: none;
            transition: 0.3s;
        }

        .sidebar a:hover {
            background: #334155;
            padding-left: 25px;
        }

        .section-title {
            padding: 15px 20px 5px;
            font-size: 12px;
            color: #94a3b8;
            text-transform: uppercase;
            font-weight: bold;
        }

        /* CONTENT */
        .main-content {
            margin-left: 260px;
            padding: 20px;
        }

        /* RESPONSIVE */
        @media (max-width: 768px) {
            .sidebar {
                position: relative;
                width: 100%;
                height: auto;
            }

            .main-content {
                margin-left: 0;
            }
        }

        .sidebar {

            width: 260px;
            min-height: 100vh;
            background: #0f172a;
            color: white;
            padding: 20px;

        }


        .sidebar-brand {

            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 30px;

        }


        .logo-sidebar {

            width: 55px;
            height: 55px;
            object-fit: contain;
            border-radius: 10px;

        }


        .sidebar-brand h5 {

            margin: 0;
            font-weight: bold;

        }


        .sidebar-brand small {

            color: #94a3b8;

        }


        .menu-link {

            display: flex;
            align-items: center;
            gap: 12px;

            padding: 12px 15px;

            color: #cbd5e1;
            text-decoration: none;

            border-radius: 10px;

            margin-bottom: 5px;

            transition: .3s;

        }


        .menu-link i {

            font-size: 18px;

        }



        .menu-link:hover,
        .menu-link.active {

            background: #2563eb;
            color: white;

        }



        .menu-title {

            font-size: 12px;
            text-transform: uppercase;

            color: #94a3b8;

            margin: 20px 10px 10px;

            font-weight: bold;

        }



        .logout:hover {

            background: #dc2626;

        }
    </style>

</head>

<body>

    <!-- SIDEBAR -->
    {% include "sidebar.html" %}

    <!-- CONTENU PRINCIPAL -->
    <div class="main-content">
        {% block content %}
        {% endblock %}
    </div>
    {% if messages %}
    <div class="container mt-3">
        {% for message in messages %}
        <div class="alert alert-{{ message.tags }}">
            {{ message }}
        </div>
        {% endfor %}
    </div>
    {% endif %}
</body>

</html>
