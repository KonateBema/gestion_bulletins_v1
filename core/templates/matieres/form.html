{% extends 'base.html' %}

{% block content %}

<div class="container py-5">

    <div class="row justify-content-center">

        <div class="col-lg-6 col-md-8">

            <!-- CARD MODERNE -->
            <div class="card border-0 shadow-lg rounded-4 overflow-hidden">

                <!-- HEADER -->
                <div class="bg-primary text-white text-center py-4">
                    <h3 class="mb-0 fw-bold">📘 Ajouter une matière</h3>
                    <small class="opacity-75">Remplissez les informations de la matière</small>
                </div>

                <!-- BODY -->
                <div class="card-body p-4 p-md-5">

                    <form method="POST">
                        {% csrf_token %}

                        <!-- CODE -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Code matière</label>
                            <div class="input-modern">
                                {{ form.code }}
                            </div>
                        </div>

                        <!-- LIBELLE -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Libellé</label>
                            <div class="input-modern">
                                {{ form.libelle }}
                            </div>
                        </div>

                        <!-- COEFFICIENT -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Coefficient</label>
                            <div class="input-modern">
                                {{ form.coefficient }}
                            </div>
                        </div>

                        <!-- VOLUME HORAIRE -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Volume horaire</label>
                            <div class="input-modern">
                                {{ form.volume_horaire }}
                            </div>
                        </div>

                        <!-- FILIERE -->
                        <!-- FILIERE BTS -->
                        <div class="mb-4">
                            <label class="form-label fw-semibold">Filière BTS</label>
                            <div class="input-modern">
                                {{ form.filiere_bts }}
                            </div>
                        </div>

                        <!-- BUTTON -->
                        <button type="submit" class="btn btn-success w-100 py-3 fw-bold rounded-3 shadow-sm">
                            💾 Enregistrer la matière
                        </button>

                        <a href="{% url 'matiere_list' %}" class="btn btn-outline-secondary w-100 mt-3 py-2 rounded-3">
                            ⬅ Retour à la liste
                        </a>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

<!-- STYLE MODERNE -->
<style>
    .input-modern input,
    .input-modern select,
    .input-modern textarea {
        width: 100%;
        padding: 12px 14px;
        border-radius: 10px;
        border: 1px solid #ddd;
        transition: all 0.2s ease-in-out;
        background: #fff;
    }

    .input-modern input:focus,
    .input-modern select:focus,
    .input-modern textarea:focus {
        border-color: #0d6efd;
        box-shadow: 0 0 0 3px rgba(13, 110, 253, 0.15);
        outline: none;
    }
</style>

{% endblock %}
