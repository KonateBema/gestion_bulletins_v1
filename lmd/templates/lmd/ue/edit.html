{% extends "base.html" %}

{% block content %}

<div class="container py-4">

    <div class="row justify-content-center">

        <div class="col-lg-10">

            <div class="card border-0 shadow-lg">

                <!-- HEADER -->
                <div class="card-header border-0 text-white"
                     style="background: linear-gradient(135deg,#198754,#157347);">

                    <div class="d-flex justify-content-between align-items-center">

                        <div>
                            <h3 class="mb-0">
                                📚 Gestion des UE
                            </h3>
                            <small>
                                Créer ou modifier une Unité d'Enseignement
                            </small>
                        </div>

                        <div class="fs-1 opacity-50">
                            🎓
                        </div>

                    </div>

                </div>

                <!-- BODY -->
                <div class="card-body p-4">

                    <form method="post">

                        {% csrf_token %}

                        <div class="row g-4">

                            <!-- CODE UE -->
                            <div class="col-md-4">

                                <label class="form-label fw-bold">
                                    🏷 Code UE
                                </label>

                                <input
                                    type="text"
                                    name="code"
                                    class="form-control form-control-lg"
                                    placeholder="Ex: UE101"
                                    value="{{ ue.code|default:'' }}"
                                    required>

                            </div>

                            <!-- CREDIT -->
                            <div class="col-md-3">

                                <label class="form-label fw-bold">
                                    🎯 Crédits
                                </label>

                                <input
                                    type="number"
                                    name="credit"
                                    class="form-control form-control-lg"
                                    placeholder="6"
                                    value="{{ ue.credit|default:'' }}"
                                    required>

                            </div>

                            <!-- SEMESTRE -->
                            <div class="col-md-5">

                                <label class="form-label fw-bold">
                                    📅 Semestre
                                </label>

                                <select
                                    name="semestre"
                                    class="form-select form-select-lg">

                                    <option value="S1"
                                        {% if ue.semestre == 'S1' %}selected{% endif %}>
                                        Semestre 1
                                    </option>

                                    <option value="S2"
                                        {% if ue.semestre == 'S2' %}selected{% endif %}>
                                        Semestre 2
                                    </option>

                                    <option value="S3"
                                        {% if ue.semestre == 'S3' %}selected{% endif %}>
                                        Semestre 3
                                    </option>

                                    <option value="S4"
                                        {% if ue.semestre == 'S4' %}selected{% endif %}>
                                        Semestre 4
                                    </option>

                                    <option value="S5"
                                        {% if ue.semestre == 'S5' %}selected{% endif %}>
                                        Semestre 5
                                    </option>

                                    <option value="S6"
                                        {% if ue.semestre == 'S6' %}selected{% endif %}>
                                        Semestre 6
                                    </option>

                                </select>

                            </div>

                            <!-- LIBELLE -->
                            <div class="col-md-12">

                                <label class="form-label fw-bold">
                                    📖 Libellé de l'UE
                                </label>

                                <input
                                    type="text"
                                    name="libelle"
                                    class="form-control form-control-lg"
                                    placeholder="Ex : Mathématiques Générales"
                                    value="{{ ue.libelle|default:'' }}"
                                    required>

                            </div>

                            <!-- FILIERE -->
                            <div class="col-md-12">

                                <label class="form-label fw-bold">
                                    🏫 Filière
                                </label>

                                <select
                                    name="filiere"
                                    class="form-select form-select-lg">

                                    {% for f in filieres %}

                                    <option
                                        value="{{ f.id }}"
                                        {% if ue.filiere.id == f.id %}selected{% endif %}>

                                        {{ f.nom }}

                                    </option>

                                    {% endfor %}

                                </select>

                            </div>

                        </div>

                        <!-- SEPARATEUR -->
                        <hr class="my-4">

                        <!-- ACTIONS -->
                        <div class="d-flex justify-content-between">

                            <a href="{% url 'ue_list' %}"
                               class="btn btn-outline-secondary btn-lg">

                                ⬅ Retour

                            </a>

                            <button
                                type="submit"
                                class="btn btn-success btn-lg px-5">

                                💾 Enregistrer

                            </button>

                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
