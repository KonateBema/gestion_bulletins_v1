{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="card shadow">

        <div class="card-body text-center">

            <h4>
                Supprimer l'UE ?
            </h4>

            <p>
                {{ ue.code }} - {{ ue.libelle }}
            </p>

            <form method="post">

                {% csrf_token %}

                <button class="btn btn-danger">
                    Oui supprimer
                </button>

                <a href="{% url 'ue_list' %}"
                   class="btn btn-secondary">

                    Annuler
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
