{% extends "base.html" %}

{% block content %}


<div class="container py-5">


    <div class="row justify-content-center">


        <div class="col-xl-8 col-lg-10 col-md-12">


            <div class="student-card">


                <!-- HEADER -->

                <div class="student-header">


                    <div class="icon-box">

                        <i class="bi bi-mortarboard-fill"></i>

                    </div>



                    <div>

                        <h3>
                            Modifier étudiant QHSE L3
                        </h3>


                        <p>
                            Mise à jour des informations académiques
                        </p>


                    </div>


                </div>




                <!-- BODY -->


                <div class="student-body">


                    <form method="post">


                        {% csrf_token %}



                        <div class="row g-4">


                            {% for field in form %}


                            <div class="col-md-6">


                                <label class="form-label">


                                    {% if field.name == "matricule" %}

                                    <i class="bi bi-person-badge"></i>


                                    {% elif field.name == "nom" or field.name == "prenoms" %}

                                    <i class="bi bi-person"></i>


                                    {% elif field.name == "sexe" %}

                                    <i class="bi bi-gender-ambiguous"></i>


                                    {% elif field.name == "date_naissance" %}

                                    <i class="bi bi-calendar-event"></i>


                                    {% elif field.name == "lieu_naissance" %}

                                    <i class="bi bi-geo-alt"></i>


                                    {% elif field.name == "telephone" %}

                                    <i class="bi bi-telephone"></i>


                                    {% elif field.name == "email" %}

                                    <i class="bi bi-envelope"></i>


                                    {% elif field.name == "statut" %}

                                    <i class="bi bi-check-circle"></i>


                                    {% endif %}



                                    {{ field.label }}


                                </label>




                                {{ field }}





                                {% if field.errors %}


                                <div class="error-message">

                                    {{ field.errors|striptags }}

                                </div>


                                {% endif %}



                            </div>


                            {% endfor %}



                        </div>





                        <div class="separator"></div>





                        <div class="actions">



                            <a href="{% url 'l3_qhse_etudiants' %}" class="btn-back">


                                <i class="bi bi-arrow-left"></i>

                                Retour


                            </a>




                            <button type="submit" class="btn-save">


                                <i class="bi bi-check-circle"></i>

                                Enregistrer


                            </button>



                        </div>



                    </form>



                </div>



            </div>



        </div>



    </div>



</div>





<style>
    body {

        background: #f4f7fb;

    }



    /* CARD */


    .student-card {


        background: white;

        border-radius: 25px;

        overflow: hidden;

        box-shadow:
            0 15px 45px rgba(0, 0, 0, .08);

        transition: .3s;


    }



    .student-card:hover {


        transform: translateY(-5px);


    }





    /* HEADER */


    .student-header {


        background:

            linear-gradient(135deg,
                #198754,
                #0f5132);


        color: white;

        padding: 30px;


        display: flex;

        align-items: center;

        gap: 20px;


    }




    .student-header h3 {


        margin: 0;

        font-size: 1.5rem;

        font-weight: 700;


    }




    .student-header p {


        margin: 5px 0 0;

        opacity: .85;


    }




    /* ICON */


    .icon-box {


        width: 75px;

        height: 75px;


        display: flex;

        align-items: center;

        justify-content: center;


        border-radius: 20px;


        background:
            rgba(255, 255, 255, .2);


        font-size: 35px;


    }





    /* BODY */


    .student-body {


        padding: 35px;


    }





    /* LABEL */


    .form-label {


        font-weight: 600;

        color: #344054;

        margin-bottom: 8px;


    }




    .form-label i {


        color: #198754;

        margin-right: 6px;


    }





    /* INPUTS */


    .form-control,
    .form-select {


        width: 100%;

        height: 50px;


        border-radius: 14px;


        border: 1px solid #dce3ea;


        padding: 0 15px;


        font-size: 15px;


        transition: .3s;


    }





    .form-control:focus,
    .form-select:focus {


        border-color: #198754;


        outline: none;


        box-shadow:

            0 0 0 4px rgba(25, 135, 84, .15);


    }






    /* SEPARATOR */


    .separator {


        height: 1px;

        background: #edf0f2;


        margin: 35px 0;


    }





    /* ACTIONS */


    .actions {


        display: flex;


        justify-content: space-between;


        align-items: center;


    }





    .btn-back,
    .btn-save {


        padding: 12px 28px;


        border-radius: 14px;


        font-weight: 600;


        text-decoration: none;


        transition: .3s;


    }





    .btn-back {


        color: #495057;


        background: white;


        border: 1px solid #dee2e6;


    }





    .btn-back:hover {


        background: #f8f9fa;


    }





    .btn-save {


        color: white;


        border: none;


        background:

            linear-gradient(135deg,
                #198754,
                #146c43);


    }





    .btn-save:hover {


        transform: translateY(-2px);


        box-shadow:

            0 10px 25px rgba(25, 135, 84, .3);


    }





    /* ERROR */


    .error-message {


        color: #dc3545;


        font-size: .85rem;


        margin-top: 5px;


    }





    /* MOBILE */


    @media(max-width:768px) {


        .student-body {

            padding: 20px;

        }



        .student-header {

            padding: 20px;

        }



        .actions {


            flex-direction: column;


            gap: 15px;


        }




        .btn-back,
        .btn-save {


            width: 100%;


            text-align: center;


        }


    }
</style>



{% endblock %}
