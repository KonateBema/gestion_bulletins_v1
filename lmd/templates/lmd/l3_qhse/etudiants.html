{% extends "base.html" %}

{% block content %}

<div class="container-fluid mt-4">


<div class="card shadow border-0">


<div class="card-header bg-primary text-white d-flex justify-content-between">

<h4>
🦺 Étudiants L3 QHSE
</h4>


<a href="{% url 'l3_qhse_etudiant_add' %}"
class="btn btn-success">

<i class="bi bi-person-plus"></i>
Ajouter

</a>


</div>


<div class="card-body">


<table class="table table-hover align-middle">


<thead class="table-dark">

<tr>

<th>Matricule</th>
<th>Nom</th>
<th>Prénoms</th>
<th>Email</th>
<th>Actions</th>

</tr>

</thead>


<tbody>


{% for e in etudiants %}


<tr>

<td>{{e.matricule}}</td>

<td>{{e.nom}}</td>

<td>{{e.prenoms}}</td>

<td>{{e.email}}</td>


<td>


<a href="{% url 'l3_qhse_etudiant_update' e.id %}"
class="btn btn-warning btn-sm">

<i class="bi bi-pencil"></i>

</a>



<a href="{% url 'l3_qhse_etudiant_delete' e.id %}"
class="btn btn-danger btn-sm">

<i class="bi bi-trash"></i>

</a>


</td>


</tr>


{% empty %}

<tr>

<td colspan="5"
class="text-center">

Aucun étudiant QHSE

</td>

</tr>


{% endfor %}


</tbody>


</table>


</div>


</div>


</div>


{% endblock %}
