{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-danger text-white">

            <h4>
                🗑️ Supprimer ECUE
            </h4>

        </div>


        <div class="card-body">

            <p>
                Voulez-vous vraiment supprimer cette ECUE ?
            </p>


            <div class="alert alert-warning">

                <strong>
                    {{ ecue.code }}
                </strong>
                -
                {{ ecue.libelle }}

            </div>


            <form method="POST">

                {% csrf_token %}


                <button class="btn btn-danger">

                    🗑️ Oui, supprimer

                </button>


                <a href="{% url 'l3_gestion_ecue_list' ecue.ue.id %}" class="btn btn-secondary">

                    Annuler

                </a>


            </form>


        </div>

    </div>

</div>

{% endblock %}
