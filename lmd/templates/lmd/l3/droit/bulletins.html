{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <div class="card shadow">

        <div class="card-header bg-primary text-white">

            <h4>
                📑 Bulletins des étudiants - Droit Privé
            </h4>

        </div>

        <div class="card-body">

            <table class="table table-hover table-bordered">

                <thead class="table-dark">

                    <tr>

                        <th>Matricule</th>

                        <th>Nom</th>

                        <th>Prénoms</th>

                        <th>Niveau</th>

                        <th width="180">
                            Action
                        </th>

                    </tr>

                </thead>

                <tbody>

                    {% for e in etudiants %}

                    <tr>

                        <td>{{ e.matricule }}</td>

                        <td>{{ e.nom }}</td>

                        <td>{{ e.prenoms }}</td>

                        <td>{{ e.niveau }}</td>

                        <td>

                            <a class="btn btn-success btn-sm" href="{% url 'imprimer_bulletin_l3_droit_prive' e.id %}">

                                🖨️ Imprimer le bulletin

                            </a>

                            

                        </td>

                    </tr>

                    {% empty %}

                    <tr>

                        <td colspan="5" class="text-center">

                            Aucun étudiant.

                        </td>

                    </tr>

                    {% endfor %}

                </tbody>

            </table>

        </div>

    </div>

</div>

{% endblock %}
