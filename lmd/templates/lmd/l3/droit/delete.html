{% extends "base.html" %}


{% block content %}


<div class="container mt-5">


    <div class="card shadow">


        <div class="card-body text-center">


            <h4>
                Supprimer {{etudiant.nom}} {{etudiant.prenoms}} ?
            </h4>


            <form method="post">

                {% csrf_token %}


                <button class="btn btn-danger">

                    Oui supprimer

                </button>


                <a href="{% url 'l3_droit_etudiants' %}" class="btn btn-secondary">

                    Annuler

                </a>


            </form>


        </div>


    </div>


</div>


{% endblock %}
