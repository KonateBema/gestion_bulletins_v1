{% extends "base.html" %}

{% block content %}

<div class="container mt-4">

    <!-- HEADER -->
    <div class="d-flex justify-content-between align-items-center mb-3">
        <h3 class="fw-bold">📚 Filières LMD</h3>

      <a href="{% url 'filiereLMD_add' %}" class="btn btn-primary">
            ➕ Ajouter une filière
        </a> 

       
    </div>

    <!-- TABLE -->
    <div class="card shadow-sm border-0">
        <div class="card-body">

            <div class="table-responsive">
                <table class="table table-hover align-middle">

                    <thead class="table-dark">
                        <tr>
                            <th>Code</th>
                            <th>Libellé</th>
                            <th class="text-center">Actions</th>
                        </tr>
                    </thead>

                    <tbody>

                        {% for f in filieres %}
                        <tr>

                            <td class="fw-semibold">{{ f.code }}</td>
                            <td>{{ f.libelle }}</td>

                            <td class="text-center">

                                <div class="d-flex justify-content-center gap-2">

                                    <!-- ✏️ MODIFIER -->
                                    <a href="{% url 'filiereLMD_edit' f.id %}" class="btn btn-sm btn-warning">
                                        ✏️
                                    </a>

                                    <!-- 🗑️ SUPPRIMER -->
                                    <a href="{% url 'filiereLMD_delete' f.id %}" class="btn btn-sm btn-danger"
                                        onclick="return confirm('Supprimer cette filière ?')">
                                        🗑️
                                    </a>

                                </div>

                            </td>

                        </tr>

                        {% empty %}

                        <tr>
                            <td colspan="3" class="text-center text-muted py-4">
                                Aucune filière enregistrée
                            </td>
                        </tr>

                        {% endfor %}

                    </tbody>

                </table>
            </div>

        </div>
    </div>

</div>

{% endblock %}
