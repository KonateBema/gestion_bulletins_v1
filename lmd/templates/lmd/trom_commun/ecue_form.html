{% extends "base.html" %}


{% block content %}


<div class="container-fluid mt-4">


    <div class="card shadow border-0">


        <div class="card-header bg-primary text-white">

            <h4 class="mb-0">

                📘 {{ titre }}

            </h4>

        </div>



        <div class="card-body">


            <form method="POST">

                {% csrf_token %}


                <div class="row">


                    {% for field in form %}

                    <div class="col-md-6 mb-3">


                        <label class="form-label fw-bold">

                            {{ field.label }}

                        </label>


                        {{ field }}



                        {% if field.errors %}

                        <div class="text-danger">

                            {{ field.errors }}

                        </div>

                        {% endif %}



                    </div>

                    {% endfor %}


                </div>



                <button class="btn btn-success">

                    <i class="bi bi-check-circle"></i>

                    Enregistrer

                </button>



                <a href="{% url 'l3_tc_ue_list' %}" class="btn btn-secondary">

                    Retour

                </a>


            </form>


        </div>


    </div>


</div>


{% endblock %}
