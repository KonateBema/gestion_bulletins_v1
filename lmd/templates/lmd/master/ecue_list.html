{% extends "base.html" %}


{% block content %}



<div class="container-fluid py-4">



    <div class="d-flex justify-content-between mb-4">


        <div>

            <h3 class="fw-bold text-primary">

                📖 ECUE

            </h3>


            <p class="text-muted">

                UE : {{ ue.libelle }}

            </p>


        </div>



        <a href="{% url 'master_ecue_add' ue.id %}" class="btn btn-success">


            <i class="bi bi-plus-circle"></i>

            Ajouter ECUE


        </a>


    </div>




    <div class="card shadow">


        <div class="card-body">


            <table class="table table-hover">


                <thead class="table-dark">


                    <tr>

                        <th>Code</th>

                        <th>Libellé</th>

                        <th>Coefficient</th>

                        <th>Crédit</th>

                        <th>Actions</th>

                    </tr>


                </thead>



                <tbody>



                    {% for ecue in ecues %}


                    <tr>


                        <td>

                            {{ ecue.code }}

                        </td>



                        <td>

                            {{ ecue.libelle }}

                        </td>



                        <td>

                            {{ ecue.coefficient }}

                        </td>



                        <td>

                            {{ ecue.credit }}

                        </td>



                        <td>


                            <a href="#" class="btn btn-warning btn-sm">

                                <i class="bi bi-pencil"></i>

                            </a>



                            <a href="#" class="btn btn-danger btn-sm">

                                <i class="bi bi-trash"></i>

                            </a>


                        </td>



                    </tr>


                    {% empty %}


                    <tr>

                        <td colspan="5" class="text-center">

                            Aucune ECUE

                        </td>

                    </tr>


                    {% endfor %}


                </tbody>


            </table>


        </div>


    </div>



</div>


{% endblock %}
