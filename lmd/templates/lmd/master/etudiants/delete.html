{% extends "base.html" %}


{% block content %}


<div class="container mt-5">


<div class="card shadow">


<div class="card-header bg-danger text-white">

<h4>
Suppression étudiant Master
</h4>

</div>


<div class="card-body">


<p>
Voulez-vous supprimer :

<strong>
{{ etudiant.nom }} {{ etudiant.prenoms }}
</strong>
?
</p>



<form method="POST">

{% csrf_token %}


<button class="btn btn-danger">

Oui, supprimer

</button>


<a href="{% url 'master_etudiant_list' %}"
class="btn btn-secondary">

Annuler

</a>


</form>


</div>


</div>


</div>


{% endblock %}
