{% extends "base.html" %}

{% block content %}

<style>

.card {
    transition: 0.3s;
}

.card:hover {
    transform: translateY(-2px);
}

.form-control:focus,
.form-select:focus {
    box-shadow: 0 0 10px rgba(25,135,84,.25);
}

</style>

<div class="container py-4">

    <div class="card border-0 shadow-lg rounded-4">

        <!-- HEADER -->
        <div class="card-header bg-success bg-gradient text-white rounded-top-4">

            <div class="d-flex align-items-center">

                <div>
                    <h3 class="mb-0">
                        <i class="bi bi-book-half"></i>
                        Gestion des ECUE
                    </h3>

                    <small>
                        Ajouter ou modifier un Élément Constitutif d'UE
                    </small>
                </div>

            </div>

        </div>

        <!-- BODY -->
        <div class="card-body p-4">

            <form method="post">

                {% csrf_token %}

                <div class="row g-3">

                    <!-- UE -->
                    <div class="col-md-3">

                        <label class="form-label fw-bold">
                            <i class="bi bi-journal-bookmark"></i>
                            Unité d'Enseignement
                        </label>

                        <select name="ue"
                                class="form-select shadow-sm"
                                required>

                            {% for u in ues %}

                            <option value="{{ u.id }}"
                                {% if ecue.ue.id == u.id %}selected{% endif %}>

                                {{ u.code }} - {{ u.libelle }}

                            </option>

                            {% endfor %}

                        </select>

                    </div>

                    <!-- CODE -->
                    <div class="col-md-3">

                        <label class="form-label fw-bold">
                            <i class="bi bi-upc-scan"></i>
                            Code ECUE
                        </label>

                        <input type="text"
                               name="code"
                               class="form-control shadow-sm"
                               placeholder="Ex : INF101"
                               value="{{ ecue.code|default:'' }}"
                               required>

                    </div>

                    <!-- COEFFICIENT -->
                    <div class="col-md-3">

                        <label class="form-label fw-bold">
                            <i class="bi bi-calculator"></i>
                            Coefficient
                        </label>

                        <input type="number"
                               name="coefficient"
                               class="form-control shadow-sm"
                               min="1"
                               value="{{ ecue.coefficient|default:1 }}"
                               required>

                    </div>

                    <!-- CREDIT -->
                    <div class="col-md-3">

                        <label class="form-label fw-bold">
                            <i class="bi bi-award"></i>
                            Crédit
                        </label>

                        <input type="number"
                               name="credit"
                               class="form-control shadow-sm"
                               min="0"
                               step="0.5"
                               value="{{ ecue.credit|default:0 }}"
                               required>

                    </div>

                    <!-- LIBELLE -->
                    <div class="col-12">

                        <label class="form-label fw-bold">
                            <i class="bi bi-card-text"></i>
                            Libellé de l'ECUE
                        </label>

                        <input type="text"
                               name="libelle"
                               class="form-control shadow-sm"
                               placeholder="Saisir le nom complet de l'ECUE"
                               value="{{ ecue.libelle|default:'' }}"
                               required>

                    </div>

                </div>

                <hr class="my-4">

                <!-- ACTIONS -->
                <div class="d-flex justify-content-between">

                    <a href="{% url 'ecue_list' %}"
                       class="btn btn-outline-secondary">

                        <i class="bi bi-arrow-left"></i>
                        Retour

                    </a>

                    <button type="submit"
                            class="btn btn-success px-4">

                        <i class="bi bi-save-fill"></i>
                        Enregistrer

                    </button>

                </div>

            </form>

        </div>

    </div>

</div>

{% endblock %}
