{% extends "base.html" %}

{% block content %}

<div class="container py-5">

    <div class="card shadow text-center">

        <div class="card-body">

            <h4>Supprimer cette ECUE ?</h4>

            <p>
                {{ ecue.code }} - {{ ecue.libelle }}
            </p>

            <form method="post">

                {% csrf_token %}

                <button class="btn btn-danger">
                    Oui supprimer
                </button>

                <a href="{% url 'ecue_list' %}"
                   class="btn btn-secondary">
                    Annuler
                </a>

            </form>

        </div>

    </div>

</div>

{% endblock %}
